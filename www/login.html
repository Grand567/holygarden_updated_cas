<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Login - Holy Garden English Secondary School</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <script src="libs/supabase.umd.js"></script>
  <script src="libs/lucide.min.js"></script>
  <!-- Nepali Date Picker -->
  <link href="./nepali.datepicker.v3.0.0.min.css" rel="stylesheet" type="text/css"/>
  <script src="./nepali.datepicker.v3.0.0.min.js" type="text/javascript"></script>
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --bg-gradient: linear-gradient(180deg, #312e81 0%, #1e1b4b 100%);
      --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.7);
      --card-bg: #ffffff;
      --error: #ef4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.25rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
      width: 100%;
      max-width: 400px;
    }

    .school-tagline {
      font-size: 0.7rem;
      font-weight: 700;
      color: white;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 1.5rem;
      opacity: 0.9;
    }

    .logo-container {
      width: 84px;
      height: 84px;
      background: white;
      border-radius: 50%;
      margin: 0 auto 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      border: 3px solid rgba(255, 255, 255, 0.2);
    }

    .logo-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      transform: scale(1.1);
    }

    .school-name {
      font-size: 1.15rem;
      font-weight: 800;
      color: white;
      letter-spacing: -0.01em;
      margin-bottom: 0.4rem;
      white-space: nowrap;
    }

    .school-info {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.4;
      font-weight: 500;
    }

    /* Notice Board Section */
    .notice-board {
      width: 100%;
      max-width: 400px;
      margin-bottom: 2rem;
    }

    .notice-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.85rem;
      padding: 0 0.5rem;
    }

    .notice-header h3 {
      font-size: 0.75rem;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.9);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .notice-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 1.25rem;
      margin-bottom: 0.75rem;
    }

    .notice-tag {
      display: none;
    }

    /* Hidden as per screenshot */
    .notice-title {
      font-size: 1rem;
      font-weight: 800;
      margin-bottom: 0.6rem;
      color: white;
    }

    .notice-body {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.85);
      line-height: 1.6;
      margin-bottom: 0.75rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .notice-date {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.6);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-weight: 600;
    }

    /* Login Card Section */
    .login-card {
      background: var(--card-bg);
      border-radius: 32px;
      width: 100%;
      max-width: 400px;
      padding: 2.25rem 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      color: #1e293b;
    }

    .login-title {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 0.4rem;
      color: #1e293b;
    }

    .login-sub {
      font-size: 0.9rem;
      color: #64748b;
      margin-bottom: 2rem;
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.6rem;
    }

    .form-group input {
      width: 100%;
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 14px;
      padding: 1rem;
      color: #1e293b;
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    button {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 1.1rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-top: 0.5rem;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    button:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fee2e2;
      color: #ef4444;
      padding: 1rem;
      border-radius: 14px;
      font-size: 0.85rem;
      margin-top: 1.25rem;
      text-align: center;
      display: none;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-5px);
      }

      75% {
        transform: translateX(5px);
      }
    }

    /* Splash Screen Fixes */
    .splash-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.4s ease-out;
    }

    .splash-logo {
      width: 120px;
      height: 120px;
      margin-bottom: 2rem;
      border-radius: 50%;
      border: 4px solid rgba(255, 255, 255, 0.1);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="splash-screen" class="splash-screen">
    <img src="512.png" class="splash-logo" alt="Logo">
    <div class="spinner"></div>
  </div>

  <div class="header">
    <p class="school-tagline">Education is the bulwark of the nation</p>
    <div class="logo-container">
      <img src="512.png" alt="School Logo" onerror="this.src='https://via.placeholder.com/150?text=HG'">
    </div>
    <h1 class="school-name">Holy Garden English Secondary School</h1>
    <div class="school-info">
      Byasi, Bhaktapur-2<br>
      Tel: 016616748
    </div>
  </div>

  <div class="notice-board">
    <div class="notice-header">
      <i data-lucide="megaphone" style="width:14px; height:14px; color:#fbbf24;"></i>
      <h3>Latest Notices From School</h3>
    </div>
    <div id="notices-container">
      <!-- Notices will be loaded here -->
    </div>
  </div>

  <div class="login-card">
    <div class="login-title">Welcome Back</div>
    <div class="login-sub">Sign in with your school account</div>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" autocomplete="email" placeholder="you@school.edu" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password"
          placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required>
      </div>
      <button type="submit" id="login-btn">Sign In &rarr;</button>
      <div id="error" class="error-msg" role="alert"></div>
    </form>
  </div>

  <div style="margin-top: 2rem; font-size: 0.75rem; text-align: center; color: rgba(255, 255, 255, 0.6); font-weight: 500; line-height: 1.4;">
    System designed & developed by<br>
    <strong style="color: white; font-weight: 700;">Rexsh K Suwal</strong>, Computer Engineer
  </div>

  <script type="module">
    import supabase from './supabase.js';
    import { toast, escapeHtml, formatDateLabel } from './shared.js';



    (async () => {
      const splash = document.getElementById('splash-screen');
      const removeSplash = () => {
        if (splash && splash.style.display !== 'none') {
          splash.style.opacity = '0';
          setTimeout(() => splash.style.display = 'none', 400);
        }
      };

      try {
        // 1. Immediately check for session
        const { data: { session }, error } = await supabase.auth.getSession();

        let profile = null;
        const cached = localStorage.getItem('userProfile');
        if (cached) {
          try { profile = JSON.parse(cached); } catch(e) {}
        }

        if ((session && !error) || profile) {
          if (!profile && session) {
            // Fetch if missing (only once)
            const { data: pData } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
            if (pData) {
              profile = pData;
              localStorage.setItem('userProfile', JSON.stringify(pData));
            }
          }

          if (profile) {
            if (window.isDesktopApp && profile.role !== 'accountant' && profile.role !== 'admin') {
              await supabase.auth.signOut();
              localStorage.removeItem('userProfile');
              removeSplash();
              toast("Desktop app is restricted to Accountant access only.");
              const errEl = document.getElementById('error');
              if (errEl) { errEl.textContent = "Desktop app is restricted to Accountant access only."; errEl.style.display = 'block'; }
              return;
            }

            const role = profile.role || '';
            const target = role === 'admin' ? 'admin.html' :
              role === 'accountant' ? 'accountant.html' :
                role === 'parent' ? 'parent.html' : 'index.html';

            // IF WE ARE REDIRECTING, DO NOT REMOVE SPLASH
            // The target page will have its own splash
            window.location.replace(`${target}?v=${Date.now()}`);
            return;
          }
        }
      } catch (e) {
        console.error("Auth check error:", e);
      }

      // 2. If we reach here, we show the login form
      removeSplash();

      // Safety fallback: if for some reason the splash is still there after 3s, remove it
      setTimeout(removeSplash, 3000);
    })();

    // ===== Lightbox Zoom for Notices =====
    window.viewNoticeImage = function(imgSrc) {
      const overlay = document.createElement('div');
      overlay.style.position = 'fixed';
      overlay.style.inset = '0';
      overlay.style.background = 'rgba(15, 23, 42, 0.9)';
      overlay.style.backdropFilter = 'blur(12px)';
      overlay.style.webkitBackdropFilter = 'blur(12px)';
      overlay.style.display = 'flex';
      overlay.style.flexDirection = 'column';
      overlay.style.alignItems = 'center';
      overlay.style.justifyContent = 'center';
      overlay.style.zIndex = '99999';
      overlay.style.padding = '1.5rem';
      overlay.style.opacity = '0';
      overlay.style.transition = 'opacity 0.25s ease-out';
      overlay.style.cursor = 'zoom-out';
      
      overlay.onclick = () => {
        overlay.style.opacity = '0';
        setTimeout(() => overlay.remove(), 250);
      };

      const img = document.createElement('img');
      img.src = imgSrc;
      img.style.maxWidth = '100%';
      img.style.maxHeight = '80vh';
      img.style.borderRadius = '16px';
      img.style.boxShadow = '0 25px 50px -12px rgba(0,0,0,0.5)';
      img.style.transform = 'scale(0.95)';
      img.style.transition = 'transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1)';
      img.style.objectFit = 'contain';

      const closeText = document.createElement('div');
      closeText.textContent = 'Tap anywhere to close';
      closeText.style.color = 'rgba(255, 255, 255, 0.5)';
      closeText.style.fontSize = '0.75rem';
      closeText.style.fontWeight = '600';
      closeText.style.marginTop = '1.25rem';
      closeText.style.letterSpacing = '0.05em';
      closeText.style.textTransform = 'uppercase';

      overlay.appendChild(img);
      overlay.appendChild(closeText);
      document.body.appendChild(overlay);
      
      requestAnimationFrame(() => {
        overlay.style.opacity = '1';
        img.style.transform = 'scale(1)';
      });
    };

    function parseNoticeBody(bodyStr) {
      if (!bodyStr) return { text: '', image: null };
      try {
        const str = bodyStr.trim();
        if (str.startsWith('{') && str.endsWith('}')) {
          const parsed = JSON.parse(str);
          if (parsed && (parsed.hasOwnProperty('text') || parsed.hasOwnProperty('image'))) {
            return {
              text: parsed.text || '',
              image: parsed.image || null
            };
          }
        }
      } catch (e) {}
      return { text: bodyStr, image: null };
    }

    async function loadNotices() {
      const container = document.getElementById('notices-container');
      try {
        let result = await supabase
          .from('notices')
          // Egress Optimization: fetch image_url (Storage URL) NOT image (base64 = huge egress)
          .select('id, title, body, image_url, created_at')
          .eq('is_active', true)
          .order('created_at', { ascending: false })
          .limit(3);

        // Fallback if schema hasn't been updated yet
        if (result.error && result.error.message && (result.error.message.includes('image_url') || result.error.message.includes('image'))) {
          console.warn('image_url column missing. Falling back to body-only notices fetch.');
          result = await supabase
            .from('notices')
            .select('id, title, body, created_at')
            .eq('is_active', true)
            .order('created_at', { ascending: false })
            .limit(3);
        }

        const { data, error } = result;

        if (error || !data || data.length === 0) {
          container.innerHTML = `<div style="background:rgba(255,255,255,0.05); border:1px dashed rgba(255,255,255,0.2); border-radius:18px; padding:1.5rem; text-align:center; color:rgba(255,255,255,0.4);"><p style="font-size:0.8rem;">No recent announcements.</p></div>`;
          return;
        }

        container.innerHTML = data.map(n => {
          const dateStr = formatDateLabel(n.created_at.split('T')[0]);
          const parsed = parseNoticeBody(n.body);
          // Use image_url (Storage URL) first, fall back to parsed.image (legacy base64 in body JSON)
          const displayImage = n.image_url || parsed.image || null;
          return `
            <div class="notice-card">
              <div class="notice-title">${escapeHtml(n.title)}</div>
              ${parsed.text ? `<div class="notice-body">${escapeHtml(parsed.text)}</div>` : ''}
              ${displayImage ? `<div style="margin-top:0.75rem; margin-bottom:0.75rem; max-width: 100%; border-radius: 12px; overflow:hidden; border:1px solid rgba(255,255,255,0.15); cursor: pointer;" onclick="window.viewNoticeImage('${displayImage}')"><img src="${displayImage}" style="width:100%; max-height: 250px; object-fit: cover; display:block;"></div>` : ''}
              <div class="notice-date"><i data-lucide="calendar" style="width:12px; height:12px;"></i>${dateStr}</div>
            </div>
          `;
        }).join('');

        if (window.lucide) lucide.createIcons();
      } catch (err) { console.error('Notice load failed:', err); }
    }


    loadNotices();

    // ===== Login Form Submission =====
    const form = document.getElementById('login-form');
    const errEl = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.style.display = 'none';
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const btn = document.getElementById('login-btn');
      const originalText = btn.textContent;
      btn.textContent = 'Signing in...';
      btn.disabled = true;

      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;

        const { data: profile, error: pErr } = await supabase
          .from('profiles').select('*').eq('id', data.user.id).single();

        if (pErr) throw new Error('Profile setup incomplete.');

        // Desktop app restriction removed to allow parents and teachers to login.

        localStorage.setItem('userProfile', JSON.stringify({...profile, _cachedAt: Date.now()}));
        const ts = Date.now();
        const target = (profile.role === 'admin') ? 'admin.html' :
          (profile.role === 'accountant') ? 'accountant.html' :
            (profile.role === 'parent') ? 'parent.html' : 'index.html';

        window.location.replace(`${target}?v=${ts}`);

      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.textContent = originalText;
        btn.disabled = false;
      }
    });
  </script>
