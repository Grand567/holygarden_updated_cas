<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Holy Garden English Secondary School - Parent Portal</title>
    <link rel="stylesheet" href="styles.css?v=1.2.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="192.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Supabase UMD -->
    <script src="libs/supabase.umd.js"></script>
    <!-- Lucide Icons -->
    <script src="libs/lucide.min.js"></script>
    <!-- SheetJS for Excel Export -->
    <script src="libs/xlsx.full.min.js"></script>
    <!-- CAS Configuration -->
    <script src="cas-config.js"></script>
    <!-- Nepali Date Picker -->
    <link href="./nepali.datepicker.v3.0.0.min.css" rel="stylesheet" type="text/css"/>
    <script src="./nepali.datepicker.v3.0.0.min.js" type="text/javascript"></script>
    <!-- CryptoJS for eSewa Signature -->
</head>

<body>
    <!-- Splash Screen -->
    <div id="splash-screen" class="splash-screen">
        <div class="spinner"></div>
    </div>

    <div id="app">
        <header class="header">
            <div class="header-content">
                <div>
                    <p
                        style="font-size:0.65rem; color:var(--primary); font-weight:700; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.2rem">
                        Holy Garden English Secondary School</p>
                    <h1 id="view-title" style="font-size:1.25rem">Parent Portal</h1>
                </div>
                <div id="user-info" style="display:flex; gap:0.5rem; align-items:center;">
                    <button class="btn btn-ghost btn-icon" onclick="window.openNotificationsFeed()"
                        title="Notifications"
                        style="color:var(--text-main); padding: 0; width: 36px; height: 36px; background: #f1f5f9; border-radius: 50%; position:relative;">
                        <i data-lucide="bell" style="width: 18px; height: 18px;"></i>
                        <span id="global-notif-badge" style="display:none; position:absolute; top:8px; right:8px; width:8px; height:8px; background:#ef4444; border-radius:50%; box-shadow:0 0 0 2px white;"></span>
                    </button>
                    <button class="btn btn-ghost btn-icon" onclick="window.openChangePasswordModal()"
                        title="Change Password"
                        style="color:var(--primary); padding: 0; width: 36px; height: 36px; background: var(--primary-light); border-radius: 50%;">
                        <i data-lucide="key-round" style="width: 18px; height: 18px;"></i>
                    </button>
                    <button class="btn btn-ghost btn-icon" onclick="window.logout()" title="Logout"
                        style="color:var(--error); padding: 0; width: 36px; height: 36px; background: var(--error-light); border-radius: 50%;">
                        <i data-lucide="log-out" style="width: 18px; height: 18px;"></i>
                    </button>
                </div>
            </div>
        </header>
 
        <main id="main-content" class="container">
            <div id="parent-dashboard">
                <div id="children-list"></div>
                <div id="child-details" style="display:none;">
                    <div id="child-profile-header" style="margin-bottom:1.5rem;"></div>

                    <div class="parent-portal-layout">
                        <!-- Vertical Dash Board -->
                        <div id="child-vertical-nav" class="vertical-nav">
                            <button class="nav-btn active" data-tab="attendance">
                                <i data-lucide="calendar-check"></i> <span>Attendance</span>
                            </button>
                            <button class="nav-btn" data-tab="homework">
                                <i data-lucide="book-open"></i> <span>Homework</span>
                            </button>
                            <button class="nav-btn" data-tab="marks">
                                <i data-lucide="bar-chart-3"></i> <span>Academic Marks</span>
                            </button>
                            <button id="nav-btn-cas" class="nav-btn" data-tab="cas" style="display:none;">
                                <i data-lucide="award"></i> <span>CAS Evaluations</span>
                            </button>
                            <button class="nav-btn" data-tab="messages">
                                <i data-lucide="mail"></i> <span>Messages</span>
                                <span id="msg-badge" class="notif-badge"></span>
                            </button>
                            <button class="nav-btn" data-tab="routine">
                                <i data-lucide="calendar"></i> <span>Routine</span>
                            </button>
                            <button class="nav-btn" data-tab="leave">
                                <i data-lucide="file-text"></i> <span>Leave Application</span>
                                <span id="leave-badge" class="notif-badge"></span>
                            </button>
                            <button class="nav-btn" data-tab="account">
                                <i data-lucide="wallet"></i> <span>Fees & Account</span>
                            </button>
                            <button class="nav-btn" data-tab="receipts">
                                <i data-lucide="receipt"></i> <span>Receipt & Statement</span>
                            </button>
                            <div style="margin-top:auto; padding-top:1rem; border-top:1px solid #f1f5f9;">
                                <button class="nav-btn" onclick="window.backToDashboard()"
                                    style="color:var(--text-muted)">
                                    <i data-lucide="arrow-left"></i> <span>Other Child</span>
                                </button>
                            </div>
                            <div style="padding:0.75rem 1rem; text-align:center; font-size:0.6rem; color:var(--text-muted); opacity:0.8; border-top:1px solid #f1f5f9; margin-top:0.5rem; font-weight: 500;">
                                Dev: Rexsh K Suwal
                            </div>
                        </div>

                        <!-- Main Content Area -->
                        <div id="child-content-area" class="content-area">
                            <div id="child-tab-content"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay" onclick="window.closeModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <button class="modal-close-btn" onclick="window.closeModal()"><i data-lucide="x"></i></button>
            <div id="modal-content"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module" src="parent-app.js?v=1.3.2"></script>
</body>

</html>
